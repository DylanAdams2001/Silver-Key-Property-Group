<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silver Key — Ad — The Yield Gap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #12210f;
    font-family: Georgia, 'Times New Roman', serif;
  }

  .ad { position: relative; width: 1080px; height: 1080px; overflow: hidden; }

  .bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center 45%;
  }

  .overlay { position: absolute; inset: 0; background: rgba(20,28,18,0.42); }

  .grad-top {
    position: absolute; top: 0; left: 0; right: 0; height: 280px;
    background: linear-gradient(to bottom, rgba(20,28,18,0.75) 0%, transparent 100%);
  }

  .grad-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 460px;
    background: linear-gradient(to top, rgba(20,28,18,0.92) 0%, rgba(20,28,18,0.55) 60%, transparent 100%);
  }

  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    padding: 54px 72px 58px;
  }

  .top-row { display: flex; align-items: center; justify-content: space-between; }
  .logo-row { display: flex; align-items: center; gap: 10px; }
  .crest { width: 34px; height: 34px; }
  .logo-word { font-family: 'Hoefler Text', Georgia, serif; font-size: 16px; letter-spacing: 0.06em; color: #F1E9D2; }

  .badge {
    background: #A9832E; color: #241C10;
    font-family: Georgia, serif; font-weight: 700;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 8px 16px;
  }

  .headline-block { margin-top: 52px; }

  .line1, .line3 {
    font-family: Georgia, serif; font-style: italic; font-weight: 400;
    font-size: 34px; color: rgba(241,233,210,0.88);
    line-height: 1.25; letter-spacing: -0.005em;
  }
  .line1 { margin-bottom: 4px; }

  .line2 {
    display: block;
    font-family: Georgia, serif; font-weight: 700;
    font-size: 168px; color: #F1E9D2;
    line-height: 0.98; letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .spacer { flex: 1; }

  .bottom { display: flex; flex-direction: column; }

  .accent-rule { width: 48px; height: 3px; background: #A9832E; margin-bottom: 22px; }

  .curiosity-line {
    font-family: 'Hoefler Text', Georgia, serif; font-weight: 400;
    font-size: 26px; color: #C9A44D; line-height: 1.3; margin-bottom: 10px;
  }

  .urgency-line {
    font-family: Georgia, serif; font-weight: 400;
    font-size: 15px; color: rgba(241,233,210,0.55);
    letter-spacing: 0.02em; margin-bottom: 30px; line-height: 1.5;
  }

  .cta-btn {
    display: flex; align-items: center; justify-content: space-between;
    background: #F1E9D2; color: #241C10;
    font-family: 'Hoefler Text', Georgia, serif; font-weight: 700;
    font-size: 16px; letter-spacing: 0.03em;
    padding: 22px 28px; width: 100%; margin-bottom: 20px;
  }

  .cta-arrow { font-size: 20px; font-weight: 300; }

  .footer {
    font-family: Georgia, serif; font-size: 12px;
    color: rgba(241,233,210,0.32); letter-spacing: 0.2em;
    text-transform: uppercase; text-align: center;
  }
</style>
